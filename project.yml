name: DoseTrack
options:
  bundleIdPrefix: com.robbrown
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  groupSortPosition: top
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: "2.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "9VY7RCG6Y4"
    # Xcode 16's "debug dylib" acceleration only loads correctly when Xcode's own debugger
    # attaches the launched process. Building/running from the command line (xcodebuild +
    # simctl launch, as used for local screenshot generation) skips that attach step, so the
    # app silently keeps running old code with no error. Disabling it makes command-line
    # builds behave like a normal statically-linked binary. Archive/Release builds were never
    # affected by this (the acceleration is Debug-only).
    ENABLE_DEBUG_DYLIB: NO
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "16"
    CODE_SIGN_STYLE: Automatic
    # Baked in so Xcode's "Update to recommended settings" banner stops reappearing —
    # applying that dialog directly in Xcode would just get overwritten by the next
    # `xcodegen generate`, since project.yml (not the .xcodeproj) is this project's
    # source of truth.
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES
    ENABLE_STRING_CATALOG_SYMBOL_GENERATION: YES

targets:
  DoseTrack:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - DoseTrack
    settings:
      base:
        INFOPLIST_FILE: DoseTrack/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.robbrown.dosetrack
        CODE_SIGN_ENTITLEMENTS: DoseTrack/Resources/DoseTrack.entitlements
        # iPhone only — daily medication reminders aren't an iPad use case, and this
        # removes the need for iPad-specific screenshots/icons on submission.
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: DoseTrack/Resources/DoseTrack.entitlements
      properties:
        aps-environment: development
        com.apple.developer.applesignin:
          - Default
        com.apple.security.application-groups:
          - group.com.robbrown.dosetrack
    dependencies:
      - target: DoseTrackWidgets
        embed: true
      # Embeds the watchOS app inside the iOS app so it actually ships. Without this the watch
      # app built as its own target but was never bundled into the archive, so TestFlight never
      # delivered it to a paired watch (it never appeared in the Watch app's app list).
      - target: DoseTrackWatch
        embed: true
      - package: Supabase
        product: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - sdk: Vision.framework

  DoseTrackWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - DoseTrackWidgets
      - path: DoseTrack/Resources/Assets.xcassets
        type: resource
      - path: DoseTrack/Models/DoseTrack.xcdatamodeld
        type: resource
      # The model's entities use codeGenerationType="category" — Xcode auto-generates only the
      # +CoreDataProperties.swift extension per target and expects these hand-written base
      # NSManagedObject subclasses (which the properties extend) to already exist in that
      # target. They're plain one-line declarations with no other dependencies, so it's safe
      # to compile them into the widget target too, without pulling in Medication+Extensions.swift
      # and friends (which reference SwiftUI/other main-app-only conveniences the widget doesn't need).
      - path: DoseTrack/Models/Medication+CoreDataClass.swift
      - path: DoseTrack/Models/Schedule+CoreDataClass.swift
      - path: DoseTrack/Models/DoseLog+CoreDataClass.swift
      # Pure, dependency-free supply arithmetic — shared with the main app so a dose marked
      # taken from the widget decrements supply identically to one marked in the app.
      - path: DoseTrack/Services/SupplyMath.swift
    settings:
      base:
        INFOPLIST_FILE: DoseTrackWidgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.robbrown.dosetrack.widgets
        CODE_SIGN_ENTITLEMENTS: DoseTrackWidgets/DoseTrackWidgets.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        INFOPLIST_OUTPUT_FORMAT: XML
        APPINTENTS_DEPLOY_SWIFT_SUPPORT_RESOURCES: NO
    entitlements:
      path: DoseTrackWidgets/DoseTrackWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.robbrown.dosetrack

  DoseTrackWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: "DoseTrackWatch Watch App"
    settings:
      base:
        INFOPLIST_FILE: "DoseTrackWatch Watch App/Info.plist"
        PRODUCT_BUNDLE_IDENTIFIER: com.robbrown.dosetrack.watchkitapp
        GENERATE_INFOPLIST_FILE: NO
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: "DoseTrackWatch Watch App/DoseTrackWatch.entitlements"
      properties:
        com.apple.security.application-groups:
          - group.com.robbrown.dosetrack

  DoseTrackTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - DoseTrackTests
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DoseTrack.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DoseTrack"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: DoseTrack
