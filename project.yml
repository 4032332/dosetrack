name: DoseTrack
options:
  bundleIdPrefix: com.robbrown
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  groupSortPosition: top
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: "2.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "9VY7RCG6Y4"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic

targets:
  DoseTrack:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - DoseTrack
    settings:
      base:
        INFOPLIST_FILE: DoseTrack/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.robbrown.dosetrack
        CODE_SIGN_ENTITLEMENTS: DoseTrack/Resources/DoseTrack.entitlements
    entitlements:
      path: DoseTrack/Resources/DoseTrack.entitlements
      properties:
        aps-environment: development
        com.apple.developer.applesignin:
          - Default
        com.apple.security.application-groups:
          - group.com.robbrown.dosetrack
    dependencies:
      - target: DoseTrackWidgets
        embed: true
      - package: Supabase
        product: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - sdk: Vision.framework

  DoseTrackWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - DoseTrackWidgets
      - path: DoseTrack/Resources/Assets.xcassets
        type: resource
      - path: DoseTrack/Models/DoseTrack.xcdatamodeld
        type: resource
      # The model's entities use codeGenerationType="category" — Xcode auto-generates only the
      # +CoreDataProperties.swift extension per target and expects these hand-written base
      # NSManagedObject subclasses (which the properties extend) to already exist in that
      # target. They're plain one-line declarations with no other dependencies, so it's safe
      # to compile them into the widget target too, without pulling in Medication+Extensions.swift
      # and friends (which reference SwiftUI/other main-app-only conveniences the widget doesn't need).
      - path: DoseTrack/Models/Medication+CoreDataClass.swift
      - path: DoseTrack/Models/Schedule+CoreDataClass.swift
      - path: DoseTrack/Models/DoseLog+CoreDataClass.swift
    settings:
      base:
        INFOPLIST_FILE: DoseTrackWidgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.robbrown.dosetrack.widgets
        CODE_SIGN_ENTITLEMENTS: DoseTrackWidgets/DoseTrackWidgets.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        INFOPLIST_OUTPUT_FORMAT: XML
        APPINTENTS_DEPLOY_SWIFT_SUPPORT_RESOURCES: NO
    entitlements:
      path: DoseTrackWidgets/DoseTrackWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.robbrown.dosetrack

  DoseTrackWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: "DoseTrackWatch Watch App"
    settings:
      base:
        INFOPLIST_FILE: "DoseTrackWatch Watch App/Info.plist"
        PRODUCT_BUNDLE_IDENTIFIER: com.robbrown.dosetrack.watchkitapp
        GENERATE_INFOPLIST_FILE: NO
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: "DoseTrackWatch Watch App/DoseTrackWatch.entitlements"
      properties:
        com.apple.security.application-groups:
          - group.com.robbrown.dosetrack

  DoseTrackTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - DoseTrackTests
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DoseTrack.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DoseTrack"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: DoseTrack
