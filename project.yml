name: DoseTrack
options:
  bundleIdPrefix: com.robbrown
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  DoseTrack:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - DoseTrack
    settings:
      base:
        INFOPLIST_FILE: DoseTrack/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.robbrown.dosetrack
        CODE_SIGN_ENTITLEMENTS: DoseTrack/Resources/DoseTrack.entitlements
    entitlements:
      path: DoseTrack/Resources/DoseTrack.entitlements
      properties:
        aps-environment: development
        com.apple.developer.usernotifications.critical-alerts: true
        com.apple.security.application-groups:
          - group.com.robbrown.dosetrack
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.robbrown.dosetrack
    dependencies:
      - target: DoseTrackWidgets
        embed: true

  DoseTrackWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - DoseTrackWidgets
    settings:
      base:
        INFOPLIST_FILE: DoseTrackWidgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.robbrown.dosetrack.widgets
        CODE_SIGN_ENTITLEMENTS: DoseTrackWidgets/DoseTrackWidgets.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        INFOPLIST_OUTPUT_FORMAT: XML
        APPINTENTS_DEPLOY_SWIFT_SUPPORT_RESOURCES: NO
    entitlements:
      path: DoseTrackWidgets/DoseTrackWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.robbrown.dosetrack

  DoseTrackWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: "DoseTrackWatch Watch App"
    settings:
      base:
        INFOPLIST_FILE: "DoseTrackWatch Watch App/Info.plist"
        PRODUCT_BUNDLE_IDENTIFIER: com.robbrown.dosetrack.watchkitapp
        GENERATE_INFOPLIST_FILE: NO
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
    entitlements:
      path: "DoseTrackWatch Watch App/DoseTrackWatch.entitlements"
      properties:
        com.apple.security.application-groups:
          - group.com.robbrown.dosetrack

  DoseTrackTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - DoseTrackTests
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DoseTrack.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DoseTrack"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: DoseTrack
